# ============================================
# 无人机出租后台管理系统 - 主配置文件
# ============================================

spring:
  application:
    name: drone-rental-admin
  
  # 激活的配置文件
  profiles:
    active: dev
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8

# MyBatis-Plus 配置
mybatis-plus:
  # Mapper XML 文件位置
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体类包路径
  type-aliases-package: com.xxq.dronerent.entity
  # 全局配置
  global-config:
    db-config:
      # 主键类型（AUTO-自增，ASSIGN_ID-雪花算法）
      id-type: AUTO
      # 逻辑删除字段名
      logic-delete-field: deleted
      # 逻辑删除值
      logic-delete-value: 1
      # 逻辑未删除值
      logic-not-delete-value: 0
  # MyBatis 配置
  configuration:
    # 驼峰命名转换
    map-underscore-to-camel-case: true
    # 日志实现
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 缓存
    cache-enabled: false

# Knife4j 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

# JWT 配置
jwt:
  # 密钥（生产环境请使用更复杂的密钥并放在环境变量中）
  secret: droneRentalSecretKey2024ForJWTTokenGenerationAndValidation
  # Token 过期时间（毫秒）- 默认24小时
  expiration: 86400000
  # Token Header 名称
  header: Authorization
  # Token 前缀
  prefix: "Bearer "

# 日志配置
logging:
  level:
    root: INFO
    com.xxq.dronerent: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/drone-rental.log
    max-size: 10MB
    max-history: 30
