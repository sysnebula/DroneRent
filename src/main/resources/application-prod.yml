# ============================================
# 生产环境配置
# ============================================

spring:
  # 数据源配置（生产环境建议使用环境变量或配置中心）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/drone_rental?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:your_password}
    
    # HikariCP 连接池配置
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      
      jedis:
        pool:
          max-active: 20
          max-wait: -1ms
          max-idle: 10
          min-idle: 5

# 服务器配置
server:
  port: 8080

# 日志配置（生产环境只记录WARN和ERROR）
logging:
  level:
    root: WARN
    com.xxq.dronerent: INFO
  file:
    name: /var/logs/drone-rental/drone-rental.log
    max-size: 50MB
    max-history: 90
